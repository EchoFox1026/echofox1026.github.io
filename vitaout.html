<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS Vita Output (RS utility)</title>
    <style>
        :root {
            --accent-color: #ff0000;
            --bg-color: #ffffff;
            --panel-bg: #ffffff;
            --text-color: #000000;
            --card-radius: 12px;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
            overflow: hidden;
        }

        .control-panel {
            background-color: var(--panel-bg);
            padding: 14px;
            border-radius: var(--card-radius);
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 10;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #333;
        }

        select {
            background: white;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        select:hover {
            transform: scale(1.05);
        }

        select:focus {
            outline: none;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: var(--accent-color);
            color: white;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.97);
        }

        .viewer-container {
            position: relative;
            width: 95vw;
            max-width: 960px; 
            aspect-ratio: 16 / 9;
            background-color: #000000;
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background-color: #000000;
        }

        .placeholder-text {
            position: absolute;
            font-size: 16px;
            color: #666677;
            text-align: center;
            pointer-events: none;
            z-index: 2;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.65);
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: all 0.2s ease, opacity 0.2s ease;
            backdrop-filter: blur(4px);
            opacity: 1;
            cursor: pointer;
        }

        .fullscreen-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .fullscreen-btn:hover {
            background-color: var(--accent-color);
            transform: scale(1.1);
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.4);
        }

        .fullscreen-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <label for="videoSource">Source:</label>
        <select id="videoSource">
            <option value="">-- Select Input Device --</option>
        </select>
        <button id="startBtn">Connect</button>
    </div>

    <div class="viewer-container" id="viewerContainer">
        <div class="placeholder-text" id="placeholder">
            No active stream.<br>Select your Vita above and click Connect.
        </div>
        
        <video id="videoFeed" autoplay playsinline muted></video>
        
        <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle Fullscreen">
            <svg viewBox="0 0 24 24">
                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
        </button>
    </div>

    <script>
        const videoElement = document.getElementById('videoFeed');
        const videoSelect = document.getElementById('videoSource');
        const startButton = document.getElementById('startBtn');
        const placeholder = document.getElementById('placeholder');
        
        const viewerContainer = document.getElementById('viewerContainer');
        const fullscreenButton = document.getElementById('fullscreenBtn');

        async function getDevices() {
            try {
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                videoSelect.innerHTML = '<option value="">-- Select PS Vita / Input Device --</option>';
                
                devices.forEach(device => {
                    if (device.kind === 'videoinput') {
                        const option = document.createElement('option');
                        option.value = device.deviceId;
                        option.text = device.label || `Camera ${videoSelect.length}`;
                        videoSelect.appendChild(option);
                    }
                });
            } catch (error) {
                console.error('Error fetching media devices:', error);
                placeholder.innerHTML = "Error accessing media devices.<br>Please ensure camera permissions are allowed.";
            }
        }

        async function startStream() {
            const videoSource = videoSelect.value;
            if (!videoSource) return alert("Please select a device first.");

            if (window.stream) {
                window.stream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    deviceId: { exact: videoSource },
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    frameRate: { ideal: 60 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                window.stream = stream;
                videoElement.srcObject = stream;
                placeholder.style.display = 'none';
            } catch (error) {
                console.error('Error starting video stream:', error);
                alert("Could not connect to the selected device.");
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                viewerContainer.requestFullscreen()
                    .catch(err => {
                        alert(`Error trying to enable full-screen mode: ${err.message}`);
                    });
            } else {
                document.exitFullscreen();
            }
        }

        function handleFullscreenChange() {
            if (document.fullscreenElement) {
                fullscreenButton.classList.add('hidden');
            } else {
                fullscreenButton.classList.remove('hidden');
            }
        }

        startButton.addEventListener('click', startStream);
        fullscreenButton.addEventListener('click', toggleFullscreen);
        
        document.addEventListener('fullscreenchange', handleFullscreenChange);

        getDevices();

        navigator.mediaDevices.ondevicechange = getDevices;
    </script>
</body>
</html>
